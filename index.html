<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIDI-Sentry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #e5e5ea;
      --surface:   #dddee2;
      --border:    #c0c0c8;
      --accent:    #0088aa;
      --accent2:   #5a2faa;
      --text:      #1a1a24;
      --muted:     #5a5a6a;
      --white-key: #f2f2f6;
      --black-key: #2a2a35;
      --key-glow:  #0088aa;
    }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
      user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ── SCANLINE OVERLAY ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.02) 2px,
        rgba(0,0,0,0.02) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      max-width: 1400px;
      max-height: 780px;
      padding: 20px 24px 16px;
      gap: 16px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .logo span { color: var(--muted); }

    #midi-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.connected {
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88;
    }

    .status-dot.error { background: #ff4466; }

    /* ── CHORD DISPLAY ── */
    #chord-display {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 56px;
    }

    #chord-name {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
      min-width: 180px;
      text-shadow: 0 0 20px rgba(0,136,170,0.25);
      transition: all 0.2s;
    }

    #chord-name.playing { animation: pulse-name 0.3s ease; }

    @keyframes pulse-name {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    #chord-notes {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    #countdown-bar {
      margin-left: auto;
      width: 140px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    #countdown-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      transition: width 0.1s linear;
    }

    /* ── PIANO WRAPPER ── */
    #piano-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      padding: 16px 16px 0;
    }

    #piano-scroll {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      align-items: flex-end;
      padding-bottom: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* ── PIANO KEYS ── */
    #piano {
      position: relative;
      display: flex;
      align-items: flex-end;
      height: 100%;
      min-height: 160px;
      padding-bottom: 12px;
      flex-shrink: 0;
    }

    .white-key {
      position: relative;
      width: 32px;
      height: 100%;
      min-height: 160px;
      background: var(--white-key);
      border: 1px solid #b8b8c4;
      border-top: none;
      border-radius: 0 0 5px 5px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.05s;
      z-index: 1;
    }

    .white-key:hover { background: #e8e8f0; }

    .white-key.active {
      background: var(--accent) !important;
      box-shadow: 0 0 20px rgba(0,136,170,0.5), inset 0 -4px 8px rgba(0,0,0,0.15);
    }

    .white-key .key-label {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: #6a6a7a;
      letter-spacing: 0;
      pointer-events: none;
    }

    .white-key.active .key-label { color: rgba(255,255,255,0.9); }

    /* Optional note labels (non-C keys) — shown when toggle is on */
    .white-key .key-label-note {
      display: none;
      color: #6a6a7a;
    }
    .show-key-names .white-key .key-label-note { display: block; }
    .white-key.active .key-label-note { color: rgba(255,255,255,0.9); }

    .black-key .key-label {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0;
      pointer-events: none;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
      line-height: 1.15;
    }
    .black-key .key-label span { display: block; }
    .show-key-names .black-key .key-label { display: flex; }
    .black-key.active .key-label,
    .black-key.active .key-label span { color: rgba(255,255,255,0.95); }

    .black-key {
      position: absolute;
      width: 20px;
      height: 58%;
      background: var(--black-key);
      border: 1px solid #333344;
      border-top: none;
      border-radius: 0 0 4px 4px;
      cursor: pointer;
      z-index: 2;
      top: 0;
      transition: background 0.05s;
      box-shadow: 2px 4px 8px rgba(0,0,0,0.5);
    }

    .black-key:hover { background: #363648; }

    .black-key.active {
      background: var(--accent) !important;
      box-shadow: 0 0 16px rgba(0,136,170,0.55), 2px 4px 8px rgba(0,0,0,0.4);
    }

    /* ── CHORD SELECTOR ── */
    #chord-selector {
      flex-shrink: 0;
      padding: 14px 0 2px;
      border-top: 1px solid var(--border);
      margin-top: 10px;
    }

    #key-selector-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    #key-selector-row .chord-section-label { margin-bottom: 0; margin-right: 2px; }
    #key-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
      min-width: 100px;
    }
    #key-select:focus { border-color: var(--accent); }
    .chord-key-checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .chord-key-checkbox-label input { cursor: pointer; }
    #inversion-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    #inversion-row .chord-section-label { margin-bottom: 0; }
    #inversion-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
      min-width: 72px;
    }
    #inversion-select:focus { border-color: var(--accent); }
    .chord-section-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .chord-groups {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chord-group {
      display: flex;
      gap: 4px;
      padding: 4px 6px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .chord-btn {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    .chord-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,136,170,0.08);
    }

    .chord-btn.selected {
      background: rgba(0,136,170,0.15);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(0,136,170,0.2);
    }

    .chord-btn.diatonic {
      border-left: 3px solid rgba(0,136,170,0.6);
      padding-left: 7px;
    }
    .chord-btn.diatonic-only-restricted {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .chord-btn.diatonic-only-restricted:hover {
      border-color: var(--border);
      color: var(--muted);
      background: transparent;
      box-shadow: none;
    }

    /* ── MONOPHONIC (TYPHON) MODE: GHOST CHORD UI ── */
    #chord-selector.ghosted {
      opacity: 0.35;
      filter: grayscale(1);
    }
    .chord-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .chord-btn:disabled:hover {
      border-color: var(--border);
      color: var(--muted);
      background: transparent;
      box-shadow: none;
    }

    /* ── MIDI DEVICE SELECTOR ── */
    #device-wrap {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #device-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #device-row label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    #midi-output-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
      min-width: 220px;
    }

    #midi-output-select:focus { border-color: var(--accent); }

    #refresh-btn {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.1em;
    }

    #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    #reconnect-btn {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.1em;
    }
    #reconnect-btn:hover { border-color: var(--accent); color: var(--accent); }

    #midi-no-ports-hint {
      display: none;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
    #midi-no-ports-hint.visible { display: block; }

    #devtools-btn {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.1em;
    }
    #devtools-btn:hover { border-color: var(--accent); color: var(--accent); }

    #key-labels-toggle {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.1em;
    }
    #key-labels-toggle:hover { border-color: var(--accent); color: var(--accent); }
    #key-labels-toggle.on {
      background: rgba(0,136,170,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── VELOCITY ── */
    #vel-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #vel-row label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #velocity-slider {
      -webkit-appearance: none;
      width: 120px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #velocity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(0,136,170,0.4);
    }

    #vel-val {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      min-width: 28px;
    }

    #sustain-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #sustain-row label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    #sustain-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
      min-width: 52px;
    }
    #sustain-select:focus { border-color: var(--accent); }

    /* ── CHORD HISTORY ── */
    #chord-history {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 88px;
    }
    .chord-history-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }
    #chord-history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      overflow-x: auto;
      overflow-y: visible;
      padding: 10px 0 2px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .chord-history-break {
      flex-basis: 100%;
      height: 0;
      margin: 0;
      padding: 0;
      border: none;
      overflow: hidden;
      pointer-events: none;
    }
    .chord-history-new-line-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .chord-history-new-line-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .chord-history-item {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      padding: 6px 12px;
      padding-right: 28px;
      background: rgba(0,136,170,0.08);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .chord-history-item:hover {
      border-color: var(--accent);
      background: rgba(0,136,170,0.12);
    }
    .chord-history-item .chord-name { font-weight: 700; color: var(--accent); font-size: 12px; }
    .chord-history-item .chord-notes { color: var(--muted); font-size: 11px; }
    .chord-history-item-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #cc3344;
      border: none;
      color: white;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s, transform 0.15s;
    }
    .chord-history-item-remove:hover {
      background: #e04455;
      transform: scale(1.1);
    }
    .chord-history-item-remove:focus {
      outline: none;
    }
    #chord-history-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #chord-history-actions button {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }
    #chord-history-actions button:hover { border-color: var(--accent); color: var(--accent); }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      padding: 8px 0 4px;
    }
  </style>
</head>
<body>
<div id="app" class="show-key-names">

  <!-- Header -->
  <header>
    <div class="logo">MIDI-SENTRY <span>for Deckard's Dream</span></div>
    <div style="display:flex; align-items:center; gap:20px;">
      <div class="controls-row">
        <div id="vel-row">
          <label>Velocity</label>
          <input type="range" id="velocity-slider" min="1" max="127" value="100">
          <span id="vel-val">100</span>
        </div>
        <div id="sustain-row">
          <label>Duration</label>
          <select id="sustain-select">
            <option value="1">1 s</option>
            <option value="2">2 s</option>
            <option value="3">3 s</option>
            <option value="4" selected>4 s</option>
            <option value="5">5 s</option>
            <option value="6">6 s</option>
            <option value="7">7 s</option>
            <option value="8">8 s</option>
            <option value="9">9 s</option>
            <option value="10">10 s</option>
          </select>
        </div>
        <div id="device-wrap">
          <div id="device-row">
            <label>MIDI Out</label>
            <select id="midi-output-select"><option value="">— select device —</option></select>
            <button id="refresh-btn">↺ REFRESH</button>
            <button id="reconnect-btn">RECONNECT</button>
            <button id="devtools-btn">DEVTOOLS</button>
          </div>
          <div id="midi-no-ports-hint" aria-live="polite">Device missing? Unplug and replug the USB cable, then click Reconnect.</div>
        </div>
        <div id="key-labels-row">
          <button id="key-labels-toggle" type="button" class="toggle-btn on" title="Show note names on all keys">KEY NAMES</button>
        </div>
      </div>
      <div id="midi-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">INITIALIZING</span>
      </div>
    </div>
  </header>

  <!-- Active Chord Display -->
  <div id="chord-display">
    <div id="chord-name">—</div>
    <div id="chord-notes">Select a chord type, then click a key</div>
    <div id="countdown-bar"><div id="countdown-fill"></div></div>
  </div>

  <!-- Piano -->
  <div id="piano-wrapper">
    <div id="piano-scroll">
      <div id="piano"></div>
    </div>

    <!-- Chord Selector (inside piano wrapper, below keys) -->
    <div id="chord-selector">
      <div id="key-selector-row">
        <label for="key-select" class="chord-section-label">Key</label>
        <select id="key-select">
          <option value="">Off</option>
          <option value="C">C major</option>
          <option value="C#">C♯ major</option>
          <option value="D">D major</option>
          <option value="D#">D♯ major</option>
          <option value="E">E major</option>
          <option value="F">F major</option>
          <option value="F#">F♯ major</option>
          <option value="G">G major</option>
          <option value="G#">G♯ major</option>
          <option value="A">A major</option>
          <option value="A#">A♯ major</option>
          <option value="B">B major</option>
          <option value="Cm">C minor</option>
          <option value="C#m">C♯ minor</option>
          <option value="Dm">D minor</option>
          <option value="D#m">D♯ minor</option>
          <option value="Em">E minor</option>
          <option value="Fm">F minor</option>
          <option value="F#m">F♯ minor</option>
          <option value="Gm">G minor</option>
          <option value="G#m">G♯ minor</option>
          <option value="Am">A minor</option>
          <option value="A#m">A♯ minor</option>
          <option value="Bm">B minor</option>
        </select>
        <label class="chord-key-checkbox-label">
          <input type="checkbox" id="diatonic-only-checkbox" title="Only allow diatonic chord types">
          <span>Diatonic only</span>
        </label>
      </div>
      <div id="inversion-row">
        <label for="inversion-select" class="chord-section-label">Inversion</label>
        <select id="inversion-select">
          <option value="0">Root</option>
          <option value="1">1st</option>
          <option value="2">2nd</option>
          <option value="3">3rd</option>
        </select>
      </div>
      <div class="chord-section-label">Chord Type</div>
      <div class="chord-groups" id="chord-groups"></div>
    </div>
  </div>

  <!-- Chord History (chords played; left to right) -->
  <div id="chord-history">
    <div class="chord-history-label">Chords played</div>
    <div id="chord-history-list"></div>
    <div id="chord-history-actions">
      <button id="chord-history-new-line" class="chord-history-new-line-btn" title="Start new phrase (next chords on new line)">↵</button>
      <button id="chord-history-save-midi">SAVE MIDI</button>
      <button id="chord-history-clear">CLEAR</button>
      <button id="chord-history-del-last">DEL LAST</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════
// CHORD DEFINITIONS
// intervals in semitones from root
// ═══════════════════════════════════════════════════
const CHORD_TYPES = [
  { group: 'Triads',
    chords: [
      { id: 'maj',   label: 'Major',        symbol: '',    intervals: [0, 4, 7] },
      { id: 'min',   label: 'Minor',        symbol: 'm',   intervals: [0, 3, 7] },
      { id: 'aug',   label: 'Augmented',    symbol: '+',   intervals: [0, 4, 8] },
      { id: 'dim',   label: 'Diminished',   symbol: '°',   intervals: [0, 3, 6] },
    ]
  },
  { group: 'Suspended',
    chords: [
      { id: 'sus2',  label: 'Sus2',         symbol: 'sus2',intervals: [0, 2, 7] },
      { id: 'sus4',  label: 'Sus4',         symbol: 'sus4',intervals: [0, 5, 7] },
    ]
  },
  { group: 'Sevenths',
    chords: [
      { id: 'dom7',  label: 'Dom 7th',      symbol: '7',   intervals: [0, 4, 7, 10] },
      { id: 'maj7',  label: 'Major 7th',    symbol: 'maj7',intervals: [0, 4, 7, 11] },
      { id: 'min7',  label: 'Minor 7th',    symbol: 'm7',  intervals: [0, 3, 7, 10] },
      { id: 'dim7',  label: 'Dim 7th',      symbol: '°7',  intervals: [0, 3, 6, 9]  },
      { id: 'hdim7', label: 'Half-Dim 7th', symbol: 'ø7',  intervals: [0, 3, 6, 10] },
      { id: 'minmaj7',label:'Min/Maj 7th',  symbol: 'mM7', intervals: [0, 3, 7, 11] },
      { id: 'augmaj7',label:'Aug/Maj 7th',  symbol: '+M7', intervals: [0, 4, 8, 11] },
    ]
  },
  { group: 'Extended',
    chords: [
      { id: 'dom9',  label: '9th',          symbol: '9',   intervals: [0, 4, 7, 10, 14] },
      { id: 'maj9',  label: 'Maj 9th',      symbol: 'maj9',intervals: [0, 4, 7, 11, 14] },
      { id: 'min9',  label: 'Min 9th',      symbol: 'm9',  intervals: [0, 3, 7, 10, 14] },
      { id: 'add9',  label: 'Add9',         symbol: 'add9',intervals: [0, 4, 7, 14] },
      { id: 'dom11', label: '11th',         symbol: '11',  intervals: [0, 4, 7, 10, 14, 17] },
      { id: 'maj11', label: 'Maj 11th',     symbol: 'M11', intervals: [0, 4, 7, 11, 14, 17] },
      { id: 'dom13', label: '13th',         symbol: '13',  intervals: [0, 4, 7, 10, 14, 17, 21] },
    ]
  },
  { group: 'Power / Other',
    chords: [
      { id: 'power', label: 'Power',        symbol: '5',   intervals: [0, 7] },
      { id: 'oct',   label: 'Octave',       symbol: '8',   intervals: [0, 12] },
    ]
  },
];

// Short display names for chord history (e.g. "C Maj", "D Min")
const CHORD_DISPLAY_SHORT = {
  maj: 'Maj', min: 'Min', aug: 'Aug', dim: 'Dim',
  sus2: 'Sus2', sus4: 'Sus4',
  dom7: 'Dom7', maj7: 'Maj7', min7: 'Min7', dim7: 'Dim7', hdim7: '½Dim7',
  minmaj7: 'MinMaj7', augmaj7: 'AugMaj7',
  dom9: '9', maj9: 'Maj9', min9: 'Min9', add9: 'Add9',
  dom11: '11', maj11: 'Maj11', dom13: '13',
  power: '5', oct: '8'
};

// Diatonic chord type IDs (I, ii, iii, IV, V, vi, vii° and their 7th/extensions in major or natural minor)
const DIATONIC_CHORD_IDS = new Set([
  'maj', 'min', 'dim', 'dom7', 'maj7', 'min7', 'hdim7',
  'dom9', 'maj9', 'min9', 'add9', 'dom11', 'maj11', 'dom13',
  'power', 'oct'
]);

// Note names (sharp) and flat equivalents for black keys
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT_NAMES  = ['','Db','','Eb','','','Gb','','Ab','','Bb',''];

function midiToNoteName(midi) {
  const oct = Math.floor(midi / 12) - 1;
  return NOTE_NAMES[midi % 12] + oct;
}

function midiToName(midi) {
  return NOTE_NAMES[midi % 12];
}

function midiToFlatName(midi) {
  return FLAT_NAMES[midi % 12];
}

// Return chord intervals in the given inversion (0=root, 1=1st=3rd in bass, etc.)
function getInvertedIntervals(intervals, inv) {
  if (!intervals.length) return intervals;
  inv = Math.max(0, Math.min(inv, intervals.length - 1));
  if (inv === 0) return intervals.slice();
  const n = intervals.length;
  const rotated = [];
  for (let i = 0; i < n; i++) rotated.push(intervals[(inv + i) % n]);
  for (let j = 1; j < n; j++) {
    while (rotated[j] < rotated[0]) rotated[j] += 12;
  }
  return rotated;
}

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let selectedOutputIndex = null; // number or null when no device selected
let selectedOutputName = ''; // display name of selected output (for per-device behavior)
let selectedChordType = CHORD_TYPES[0].chords[0]; // default: Major
let activeNotes = []; // currently playing midi notes
let countdownTimer = null;
let countdownStart = null;
let chordHistory = [[]]; // array of phrases; each phrase is array of { chordName, noteNames, notes }
let selectedKey = ''; // '' = off, or 'C', 'C#', ... 'B', 'Cm', ... 'Bm'
let restrictToDiatonic = false;
let selectedInversion = 0; // 0=root, 1=1st, 2=2nd, 3=3rd

// ═══════════════════════════════════════════════════
// DEVICE CAPABILITIES
// ═══════════════════════════════════════════════════
const MONOPHONIC_DEVICE_NAME_PATTERNS = [
  /\btyphon\b/i, // "Dreadbox Typhon"
];

function isMonophonicOutputSelected() {
  const name = String(selectedOutputName || '');
  return MONOPHONIC_DEVICE_NAME_PATTERNS.some(re => re.test(name));
}

function updateDiatonicChordUI() {
  const keyOn = selectedKey !== '';
  document.querySelectorAll('.chord-btn').forEach(btn => {
    const id = btn.dataset.chordId;
    const diatonic = DIATONIC_CHORD_IDS.has(id);
    btn.classList.toggle('diatonic', keyOn && diatonic);
    btn.classList.toggle('diatonic-only-restricted', keyOn && restrictToDiatonic && !diatonic);
    const ghost = isMonophonicOutputSelected();
    const restricted = keyOn && restrictToDiatonic && !diatonic;
    btn.disabled = ghost || restricted;
    btn.setAttribute('aria-disabled', btn.disabled ? 'true' : 'false');
  });
}

function updateChordUiForOutput() {
  const ghost = isMonophonicOutputSelected();
  const selector = document.getElementById('chord-selector');
  if (selector) selector.classList.toggle('ghosted', ghost);
  updateDiatonicChordUI();

  // Keep the UI up but make the intent clear when idle.
  if (!activeNotes.length) {
    const notesEl = document.getElementById('chord-notes');
    if (notesEl) {
      notesEl.textContent = ghost
        ? 'Typhon mode: click a key to play a note'
        : 'Select a chord type, then click a key';
    }
  }
}

// ═══════════════════════════════════════════════════
// BUILD PIANO
// ═══════════════════════════════════════════════════
const piano = document.getElementById('piano');

// MIDI note 21 = A0, note 108 = C8 (standard 88 keys)
const FIRST_NOTE = 21;
const LAST_NOTE  = 108;

// Which notes are black keys
const BLACK_PATTERN = [false,true,false,true,false,false,true,false,true,false,true,false];

const keyElements = {}; // midiNote -> element

function buildPiano() {
  piano.innerHTML = '';
  let whiteIndex = 0;
  const whiteKeys = [];
  const blackKeys = [];

  for (let note = FIRST_NOTE; note <= LAST_NOTE; note++) {
    const isBlack = BLACK_PATTERN[note % 12];
    if (!isBlack) {
      const el = document.createElement('div');
      el.className = 'white-key';
      el.dataset.note = note;
      const lbl = document.createElement('div');
      lbl.className = note % 12 === 0 ? 'key-label' : 'key-label key-label-note';
      lbl.textContent = note % 12 === 0 ? midiToNoteName(note) : midiToName(note);
      el.appendChild(lbl);
      el.addEventListener('click', () => triggerChord(note));
      keyElements[note] = el;
      whiteKeys.push({ el, note });
      whiteIndex++;
    }
  }

  // Render white keys first
  whiteKeys.forEach(k => piano.appendChild(k.el));

  // Now position black keys absolutely
  // Walk through notes again, tracking white key positions
  let wIdx = 0;
  const wWidth = 32; // px, matches CSS
  for (let note = FIRST_NOTE; note <= LAST_NOTE; note++) {
    const isBlack = BLACK_PATTERN[note % 12];
    if (!isBlack) {
      wIdx++;
    } else {
      const el = document.createElement('div');
      el.className = 'black-key';
      el.dataset.note = note;
      const lbl = document.createElement('div');
      lbl.className = 'key-label';
      const flat = midiToFlatName(note);
      const sharp = midiToName(note);
      const flatSpan = document.createElement('span');
      flatSpan.textContent = flat;
      const sharpSpan = document.createElement('span');
      sharpSpan.textContent = sharp;
      lbl.appendChild(flatSpan);
      lbl.appendChild(sharpSpan);
      el.appendChild(lbl);
      // Position: center on the gap between the two adjacent white keys
      el.style.left = (wIdx * wWidth - 11) + 'px';
      el.addEventListener('click', () => triggerChord(note));
      keyElements[note] = el;
      piano.appendChild(el);
    }
  }

  // Set piano width
  const whiteCount = whiteKeys.length;
  piano.style.width = (whiteCount * wWidth) + 'px';
}

// ═══════════════════════════════════════════════════
// BUILD CHORD SELECTOR
// ═══════════════════════════════════════════════════
function buildChordSelector() {
  const container = document.getElementById('chord-groups');
  container.innerHTML = '';

  CHORD_TYPES.forEach(group => {
    const groupEl = document.createElement('div');
    groupEl.className = 'chord-group';

    group.chords.forEach(chord => {
      const btn = document.createElement('button');
      btn.className = 'chord-btn' + (chord.id === selectedChordType.id ? ' selected' : '');
      btn.textContent = chord.label;
      btn.dataset.chordId = chord.id;
      btn.addEventListener('click', () => selectChord(chord, btn));
      groupEl.appendChild(btn);
    });

    container.appendChild(groupEl);
  });
  updateDiatonicChordUI();
}

function selectChord(chord, btn) {
  if (isMonophonicOutputSelected()) return;
  if (btn.disabled) return; // e.g. diatonic-only restriction
  selectedChordType = chord;
  document.querySelectorAll('.chord-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ═══════════════════════════════════════════════════
// TRIGGER CHORD
// ═══════════════════════════════════════════════════
function triggerChord(rootNote) {
  try {
    rootNote = Number(rootNote);
    if (!Number.isFinite(rootNote) || rootNote < FIRST_NOTE || rootNote > LAST_NOTE) return;

    // Stop any currently playing chord
    stopCurrentChord();

    const velocity = parseInt(document.getElementById('velocity-slider').value, 10) || 100;
    const mono = isMonophonicOutputSelected();
    const baseIntervals = mono ? [0] : selectedChordType.intervals;
    const inv = Math.min(selectedInversion, baseIntervals.length - 1);
    const intervals = inv === 0 ? baseIntervals : getInvertedIntervals(baseIntervals, inv);
    const notes = intervals
      .map(i => rootNote + i)
      .filter(n => n >= 0 && n <= 127);
    activeNotes = notes;

    // Update display and UI
    if (mono) updateNoteDisplay(rootNote);
    else updateChordDisplay(rootNote, notes);
    notes.forEach(note => {
      const el = keyElements[note];
      if (el) el.classList.add('active');
    });
    startCountdown();

    // Add to chord history (name, note names, and MIDI notes for replay)
    const phrase = chordHistory[chordHistory.length - 1];
    if (mono) {
      const nn = midiToNoteName(rootNote);
      phrase.push({ chordName: nn, noteNames: nn, notes: [rootNote] });
    } else {
      const rootName = midiToName(rootNote);
      const shortLabel = CHORD_DISPLAY_SHORT[selectedChordType.id] || selectedChordType.label;
      const historyChordName = rootName + ' ' + shortLabel;
      const historyNoteNames = notes.map(n => midiToNoteName(n)).join(' ');
      phrase.push({ chordName: historyChordName, noteNames: historyNoteNames, notes: notes.slice() });
    }
    renderChordHistory();

    // Send MIDI via main process (avoids Web MIDI renderer crash on Windows)
    const vel = Math.max(0, Math.min(127, velocity));
    notes.forEach(note => sendNoteOn(note, vel));
  } catch (err) {
    console.error('triggerChord error:', err);
    const txt = document.getElementById('status-text');
    if (txt) txt.textContent = 'ERROR: ' + (err.message || String(err));
  }
}

function stopCurrentChord() {
  if (countdownTimer) {
    clearInterval(countdownTimer);
    countdownTimer = null;
  }
  // Send note-off for all active notes
  activeNotes.forEach(note => sendNoteOff(note));
  // Clear key highlights immediately
  activeNotes.forEach(note => {
    if (keyElements[note]) keyElements[note].classList.remove('active');
  });
  activeNotes = [];
  document.getElementById('countdown-fill').style.width = '0%';
}

function getSustainMs() {
  const sec = parseInt(document.getElementById('sustain-select').value, 10);
  return Math.max(1, Math.min(10, isNaN(sec) ? 4 : sec)) * 1000;
}

function startCountdown() {
  countdownStart = Date.now();
  const sustainMs = getSustainMs();
  const fill = document.getElementById('countdown-fill');
  fill.style.width = '100%';

  countdownTimer = setInterval(() => {
    const elapsed = Date.now() - countdownStart;
    const pct = Math.max(0, 100 - (elapsed / sustainMs) * 100);
    fill.style.width = pct + '%';

    const t = elapsed / sustainMs; // 0 → 1
    activeNotes.forEach(note => {
      const el = keyElements[note];
      if (!el) return;
      if (t >= 1) {
        el.classList.remove('active');
      }
    });

    if (elapsed >= sustainMs) {
      clearInterval(countdownTimer);
      countdownTimer = null;
      activeNotes.forEach(note => sendNoteOff(note));
      activeNotes = [];
      fill.style.width = '0%';
    }
  }, 50);
}

function playChordFromHistory(entry) {
  const { chordName, noteNames, notes } = entry;
  if (!notes || !notes.length) return;
  const mono = isMonophonicOutputSelected();
  stopCurrentChord();
  const playbackNotes = mono ? [notes[0]] : notes.slice();
  activeNotes = playbackNotes.slice();

  // Update main display
  if (mono) {
    updateNoteDisplay(playbackNotes[0]);
  } else {
    const nameEl = document.getElementById('chord-name');
    nameEl.textContent = chordName;
    nameEl.classList.remove('playing');
    void nameEl.offsetWidth;
    nameEl.classList.add('playing');
    document.getElementById('chord-notes').textContent = noteNames;
  }
  // Highlight keys
  playbackNotes.forEach(note => {
    const el = keyElements[note];
    if (el) el.classList.add('active');
  });
  startCountdown();
  const velocity = parseInt(document.getElementById('velocity-slider').value, 10) || 100;
  const vel = Math.max(0, Math.min(127, velocity));
  playbackNotes.forEach(note => sendNoteOn(note, vel));
}

function renderChordHistory() {
  const list = document.getElementById('chord-history-list');
  list.innerHTML = '';
  chordHistory.forEach((phrase, phraseIdx) => {
    if (phraseIdx > 0) {
      const br = document.createElement('div');
      br.className = 'chord-history-break';
      list.appendChild(br);
    }
    phrase.forEach((entry, chordIdx) => {
      const { chordName, noteNames } = entry;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chord-history-item';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'chord-name';
      nameSpan.textContent = chordName;
      const notesSpan = document.createElement('span');
      notesSpan.className = 'chord-notes';
      notesSpan.textContent = '(' + noteNames + ')';
      btn.appendChild(nameSpan);
      btn.appendChild(notesSpan);
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'chord-history-item-remove';
      removeBtn.innerHTML = '&times;';
      removeBtn.setAttribute('aria-label', 'Remove chord');
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        chordHistory[phraseIdx].splice(chordIdx, 1);
        if (chordHistory[phraseIdx].length === 0 && chordHistory.length > 1) {
          chordHistory.splice(phraseIdx, 1);
        }
        renderChordHistory();
      });
      btn.appendChild(removeBtn);
      btn.addEventListener('click', (e) => {
        if (e.target === removeBtn || removeBtn.contains(e.target)) return;
        playChordFromHistory(entry);
      });
      list.appendChild(btn);
    });
  });
}

function updateChordDisplay(rootNote, notes) {
  const rootName = midiToName(rootNote);
  const chordName = rootName + selectedChordType.symbol;
  const noteNames = notes.map(n => midiToNoteName(n)).join('  ');

  const nameEl = document.getElementById('chord-name');
  nameEl.textContent = chordName;
  nameEl.classList.remove('playing');
  void nameEl.offsetWidth; // reflow
  nameEl.classList.add('playing');

  document.getElementById('chord-notes').textContent = noteNames;
}

function updateNoteDisplay(note) {
  const nn = midiToNoteName(note);
  const nameEl = document.getElementById('chord-name');
  nameEl.textContent = nn;
  nameEl.classList.remove('playing');
  void nameEl.offsetWidth; // reflow
  nameEl.classList.add('playing');
  document.getElementById('chord-notes').textContent = nn;
}

// ═══════════════════════════════════════════════════
// MIDI (via main process — avoids renderer crash on Windows)
// ═══════════════════════════════════════════════════
function sendNoteOn(note, velocity) {
  if (selectedOutputIndex == null || selectedOutputIndex === '') return;
  if (window.electronAPI && window.electronAPI.sendNoteOn) {
    window.electronAPI.sendNoteOn(note, velocity);
  }
}

function sendNoteOff(note) {
  if (selectedOutputIndex == null || selectedOutputIndex === '') return;
  if (window.electronAPI && window.electronAPI.sendNoteOff) {
    window.electronAPI.sendNoteOff(note);
  }
}

async function initMidi() {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');

  if (!window.electronAPI || !window.electronAPI.getMidiOutputs) {
    dot.classList.add('error');
    txt.textContent = 'NO MIDI API';
    return;
  }

  try {
    const ports = await window.electronAPI.getMidiOutputs();
    dot.classList.add('connected');
    txt.textContent = ports.length ? 'MIDI READY' : 'NO PORTS';
    populateOutputs(ports);
  } catch (e) {
    dot.classList.add('error');
    txt.textContent = 'MIDI ERROR';
    console.error('MIDI init error:', e);
  }
}

function populateOutputs(ports) {
  const select = document.getElementById('midi-output-select');
  const hint = document.getElementById('midi-no-ports-hint');
  const prevValue = select.value;
  select.innerHTML = '<option value="">— select device —</option>';

  if (hint) hint.classList.toggle('visible', !ports || !ports.length);

  if (!ports || !ports.length) {
    updateSelectedOutput();
    return;
  }

  let autoIndex = null;
  ports.forEach(({ index, name }) => {
    const opt = document.createElement('option');
    opt.value = String(index);
    opt.textContent = name;
    select.appendChild(opt);
    if (name.toLowerCase().includes('deckard') || name.toLowerCase().includes('dream')) {
      autoIndex = index;
    }
  });

  if (prevValue && select.querySelector(`option[value="${prevValue}"]`)) {
    select.value = prevValue;
  } else if (autoIndex !== null) {
    select.value = String(autoIndex);
  }

  updateSelectedOutput();
}

async function updateSelectedOutput() {
  const select = document.getElementById('midi-output-select');
  const txt = document.getElementById('status-text');
  const val = select.value;
  if (val !== '' && window.electronAPI && window.electronAPI.selectMidiOutput) {
    const index = parseInt(val, 10);
    const ok = await window.electronAPI.selectMidiOutput(index);
    selectedOutputIndex = ok ? index : null;
    const opt = select.selectedOptions[0];
    selectedOutputName = ok && opt ? opt.textContent : '';
    txt.textContent = ok && opt ? opt.textContent.toUpperCase().slice(0, 24) : 'NO DEVICE';
  } else {
    selectedOutputIndex = null;
    selectedOutputName = '';
    if (window.electronAPI) {
      await window.electronAPI.selectMidiOutput(-1);
    }
    txt.textContent = 'SELECT DEVICE';
  }
  updateChordUiForOutput();
}

// ═══════════════════════════════════════════════════
// VELOCITY SLIDER
// ═══════════════════════════════════════════════════
document.getElementById('velocity-slider').addEventListener('input', function() {
  document.getElementById('vel-val').textContent = this.value;
});

document.getElementById('key-select').addEventListener('change', function() {
  selectedKey = this.value || '';
  updateDiatonicChordUI();
  if (restrictToDiatonic && selectedKey && !DIATONIC_CHORD_IDS.has(selectedChordType.id)) {
    const first = CHORD_TYPES.flatMap(g => g.chords).find(c => DIATONIC_CHORD_IDS.has(c.id));
    if (first) { selectedChordType = first; buildChordSelector(); }
  }
});

document.getElementById('diatonic-only-checkbox').addEventListener('change', function() {
  restrictToDiatonic = this.checked;
  updateDiatonicChordUI();
  if (restrictToDiatonic && selectedKey && !DIATONIC_CHORD_IDS.has(selectedChordType.id)) {
    const first = CHORD_TYPES.flatMap(g => g.chords).find(c => DIATONIC_CHORD_IDS.has(c.id));
    if (first) { selectedChordType = first; buildChordSelector(); }
  }
});

document.getElementById('inversion-select').addEventListener('change', function() {
  selectedInversion = parseInt(this.value, 10) || 0;
});

// ═══════════════════════════════════════════════════
// DEVICE CONTROLS
// ═══════════════════════════════════════════════════
document.getElementById('midi-output-select').addEventListener('change', () => {
  // Ensure any currently held notes get a note-off on the *previous* device.
  stopCurrentChord();
  updateSelectedOutput();
});
document.getElementById('refresh-btn').addEventListener('click', async () => {
  if (!window.electronAPI || !window.electronAPI.getMidiOutputs) return;
  const statusEl = document.getElementById('status-text');
  const prev = statusEl ? statusEl.textContent : '';
  if (statusEl) statusEl.textContent = 'REFRESHING…';
  const ports = await window.electronAPI.getMidiOutputs({ releaseFirst: true, delayMs: 500 });
  populateOutputs(ports);
  if (statusEl) statusEl.textContent = ports.length ? (document.getElementById('midi-output-select').selectedOptions[0]?.textContent?.toUpperCase().slice(0, 24) || 'MIDI READY') : prev;
});

document.getElementById('reconnect-btn').addEventListener('click', async () => {
  if (!window.electronAPI || !window.electronAPI.getMidiOutputs) return;
  const statusEl = document.getElementById('status-text');
  if (statusEl) statusEl.textContent = 'RECONNECTING…';
  const ports = await window.electronAPI.getMidiOutputs({ releaseFirst: true, delayMs: 2000 });
  populateOutputs(ports);
  updateSelectedOutput();
});
document.getElementById('devtools-btn').addEventListener('click', () => {
  if (typeof window.electronAPI !== 'undefined' && window.electronAPI.openDevTools) {
    window.electronAPI.openDevTools();
  }
});
document.getElementById('key-labels-toggle').addEventListener('click', function() {
  const app = document.getElementById('app');
  const on = app.classList.toggle('show-key-names');
  this.classList.toggle('on', on);
});

document.getElementById('chord-history-new-line').addEventListener('click', () => {
  if (chordHistory[chordHistory.length - 1].length > 0) chordHistory.push([]);
  renderChordHistory();
});

document.getElementById('chord-history-save-midi').addEventListener('click', async () => {
  const flat = chordHistory.flat();
  if (!flat.length) return;
  if (!window.electronAPI || !window.electronAPI.saveMidiFile) return;
  const result = await window.electronAPI.saveMidiFile(flat);
  if (result.ok) {
    const statusEl = document.getElementById('status-text');
    if (statusEl) statusEl.textContent = 'MIDI SAVED';
    setTimeout(() => { if (statusEl) statusEl.textContent = document.getElementById('midi-output-select').selectedOptions[0]?.textContent?.toUpperCase().slice(0, 24) || 'SELECT DEVICE'; }, 2000);
  } else if (!result.canceled && result.error) {
    const statusEl = document.getElementById('status-text');
    if (statusEl) statusEl.textContent = 'SAVE ERR';
  }
});

document.getElementById('chord-history-clear').addEventListener('click', () => {
  chordHistory = [[]];
  renderChordHistory();
});
document.getElementById('chord-history-del-last').addEventListener('click', () => {
  if (chordHistory.length) {
    const last = chordHistory[chordHistory.length - 1];
    last.pop();
    if (last.length === 0 && chordHistory.length > 1) chordHistory.pop();
    renderChordHistory();
  }
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildPiano();
buildChordSelector();
renderChordHistory();
initMidi();
updateChordUiForOutput();

// Scroll piano to show middle C (C4 = MIDI 60) centered
requestAnimationFrame(() => {
  const scroll = document.getElementById('piano-scroll');
  const c4 = keyElements[60];
  if (c4) {
    const offset = c4.offsetLeft - scroll.clientWidth / 2 + 16;
    scroll.scrollLeft = Math.max(0, offset);
  }
});
</script>
